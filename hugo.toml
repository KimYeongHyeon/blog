baseURL = 'https://kimyeonghyeon.github.io/CV/'
locale = 'en-us'
title = 'CV'
theme = 'PaperMod'

[params]
env = "production"
description = "Ph.D Student @ BiLab, SNU | Biomedical AI and Medical Image Analysis"
author = "Kim YeongHyeon"

# Theme settings
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

# Profile mode
[params.profileMode]
enabled = true
title = "CV"
subtitle = "Kim YeongHyeon | Ph.D Student @ BiLab, SNU"

[[params.profileMode.buttons]]
name = "CV"
url = "/cv"

[[params.profileMode.buttons]]
name = "Publications"
url = "/publications"

[[params.profileMode.buttons]]
name = "Projects"
url = "/projects"

# Social icons
[[params.socialIcons]]
name = "email"
url = "mailto:yeonghyeon.kim@snu.ac.kr"

[[params.socialIcons]]
name = "googlescholar"
url = "https://scholar.google.co.kr/citations?user=cLAlajcAAAAJ&hl=ko"

[[params.socialIcons]]
